configuration:
  systemID:
    name: ID del sistema
    description: El ID de su sistema Setecna REG tal como aparece en la interfaz web s5a.eu.
  username:
    name: Nombre de usuario
    description: El correo electrónico de su cuenta de s5a.eu.
  password:
    name: Contraseña
    description: La contraseña de su cuenta de s5a.eu.
  readonly:
    name: Modo de solo lectura
    description: Exponer solo los sensores, sin escribir nunca nada de vuelta al sistema Setecna.
  diagnostics:
    name: Exponer entidades de diagnóstico
    description: >-
      Si está activado, expone las entidades de diagnóstico (códigos en bruto, alarmas, salidas de placa, estado de bombas/controlador, ...) como entidades deshabilitadas que puede activar individualmente. Si está desactivado (predeterminado), no se crean.
  adv_int:
    name: Integración avanzada
    description: Crear entidades climate nativas de Home Assistant para cada zona activa (requiere el modo de solo lectura desactivado).
  cleanup_legacy:
    name: Limpiar entidades v1.x
    description: Al iniciar, eliminar los topics de descubrimiento MQTT por entidad creados por las versiones 1.x del add-on.
  poll_interval:
    name: Intervalo de sondeo
    description: Segundos entre las actualizaciones de datos desde la nube de Setecna (10-600).
  mqtt_host:
    name: Host del servidor MQTT externo
    description: Nombre de host o IP de un broker MQTT personalizado. Déjelo vacío para detectar automáticamente el add-on Mosquitto.
  mqtt_port:
    name: Puerto del servidor MQTT externo
    description: Puerto del broker MQTT personalizado (predeterminado 1883). Solo se usa cuando se define un host personalizado.
  mqtt_username:
    name: Usuario del servidor MQTT externo
    description: Usuario del broker MQTT personalizado. Déjelo vacío para acceso anónimo.
  mqtt_password:
    name: Contraseña del servidor MQTT externo
    description: Contraseña del broker MQTT personalizado.
  entity_names:
    name: Renombrar entidades
    description: >-
      Renombre las entidades con una línea "PREFIJO=Nombre" por entrada. Un prefijo de zona renombra el dispositivo de esa zona y todas sus entidades, p. ej. "Z1=Baños" (el termostato y todos los sensores de la zona lo siguen). Un id de parámetro exacto renombra una sola entidad, p. ej. "GLOBAL_OUTPUT_3=Bomba de recirculación". Los prefijos e ids distinguen mayúsculas y minúsculas ("Z1", no "z1"). El registro del add-on lista las etiquetas de su sistema para copiar.
  active_zones:
    name: Zonas a exponer
    description: >-
      Lista de permitidos opcional de los números de zona a exponer (p. ej. 1,
      2, 3). Las zonas detectadas en el panel pero no listadas aquí - con todos
      sus sensores, controles y termostato - se ocultan y se eliminan de Home
      Assistant. Déjelo vacío para exponer todas las zonas detectadas.
