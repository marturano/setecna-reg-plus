configuration:
  systemID:
    name: System ID
    description: The ID of your Setecna REG system as shown in the s5a.eu web interface.
  username:
    name: Username
    description: Your s5a.eu account email.
  password:
    name: Password
    description: Your s5a.eu account password.
  readonly:
    name: Read-only mode
    description: Only expose sensors, never write anything back to the Setecna system.
  diagnostics:
    name: Expose diagnostic entities
    description: >-
      When enabled, exposes the diagnostic entities (raw codes, alarms, board outputs, heat-pump/controller status, ...) as disabled entities you can turn on individually. When off (default) they are not created, keeping the device pages clean.
  language:
    name: Dropdown labels language
    description: >-
      Language used for the options of the dropdown/enum entities (Season, zone and calendar forcing, calendar mode). Home Assistant cannot translate these automatically. Names of entities stay in English. Default: English.
  system_control:
    name: Show System control
    description: >-
      Show the master System on/off control (turns the whole plant on or off). Turn this off to hide it and prevent accidental switching (e.g. from voice assistants). Only applies when read-only mode is off. Default: on.
  season_control:
    name: Show Season control
    description: >-
      Show the Season selector (winter/summer). Turn off to hide it and prevent accidental changes. Only applies when read-only mode is off. Default: on.
  acs_control:
    name: Show ACS control
    description: >-
      Show the ACS (domestic hot water) enable switch. Turn off to hide it and prevent accidental switching. Only applies when read-only mode is off. Default: on.
  adv_int:
    name: Advanced integration
    description: Create native Home Assistant climate entities for each active zone (requires read-only mode disabled).
  cleanup_legacy:
    name: Clean up v1.x entities
    description: On startup, remove the per-entity MQTT discovery topics created by add-on versions 1.x.
  debug:
    name: Full debug logging
    description: Log all fetched parameters and every MQTT message. For troubleshooting/support purposes only; leave off for normal use.
  hide_unavailable:
    name: Hide unavailable sensors
    description: Do not create temperature/raw sensors whose input reads a "not available" value on your system (they would show as "unknown"). Controls and derived sensors are unaffected. Off by default.
  poll_interval:
    name: Poll interval
    description: Seconds between data refreshes from the Setecna cloud (10-600).
  mqtt_host:
    name: External MQTT server host
    description: Hostname or IP of a custom MQTT broker. Leave empty to auto-discover the Mosquitto broker add-on.
  mqtt_port:
    name: External MQTT server port
    description: Port of the custom MQTT broker (default 1883). Only used when a custom host is set.
  mqtt_username:
    name: External MQTT server username
    description: Username for the custom MQTT broker. Leave empty for anonymous access.
  mqtt_password:
    name: External MQTT server password
    description: Password for the custom MQTT broker.
  entity_names:
    name: Entity name overrides
    description: >-
      Rename entities with one "PREFIX=Name" line per entry. A zone prefix renames that zone's device and every entity under it, e.g. "Z1=Bathrooms" (the thermostat and all zone sensors follow). An exact parameter id renames a single entity, e.g. "GLOBAL_OUTPUT_3=Recirculation pump". Prefixes and ids are case-sensitive (use "Z1", not "z1"). A calendar prefix ("MT1", "MT2", ...) renames that schedule's preset and mode together, e.g. "MT3=Bathrooms". The add-on log lists your system's labels to copy.
  active_zones:
    name: Zones to expose
    description: >-
      Optional allowlist of zone numbers to expose (e.g. 1, 2, 3). Zones detected
      on the panel but not listed here - and all their sensors, controls and
      thermostat - are hidden and removed from Home Assistant. Leave empty to
      expose every detected zone.
