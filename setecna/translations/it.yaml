configuration:
  systemID:
    name: ID sistema
    description: L'ID del tuo sistema Setecna REG come mostrato nell'interfaccia web s5a.eu.
  username:
    name: Nome utente
    description: L'email del tuo account s5a.eu.
  password:
    name: Password
    description: La password del tuo account s5a.eu.
  readonly:
    name: Modalità sola lettura
    description: Espone solo i sensori, senza mai scrivere valori verso il sistema Setecna.
  diagnostics:
    name: Esponi entità di diagnostica
    description: >-
      Se attivo, espone le entità di diagnostica (codici grezzi, allarmi, uscite scheda, stato pompe/controllore, ...) come entità disabilitate che puoi attivare singolarmente. Se disattivo (default) non vengono create, mantenendo pulite le pagine dei dispositivi.
  language:
    name: Lingua etichette menu a tendina
    description: >-
      Lingua usata per le opzioni dei menu a tendina/enum (Season, forzatura zone e calendari, modalità calendario). Home Assistant non può tradurle automaticamente. I nomi delle entità restano in inglese. Predefinito: inglese.
  system_control:
    name: Mostra controllo System
    description: >-
      Mostra il controllo master System on/off (accende o spegne l'intero impianto). Disattivalo per nasconderlo ed evitare spegnimenti accidentali (es. da assistenti vocali). Ha effetto solo con modalità sola lettura disattivata. Predefinito: attivo.
  season_control:
    name: Mostra controllo Season
    description: >-
      Mostra il selettore Season (inverno/estate). Disattivalo per nasconderlo ed evitare cambi accidentali. Ha effetto solo con modalità sola lettura disattivata. Predefinito: attivo.
  acs_control:
    name: Mostra controllo ACS
    description: >-
      Mostra lo switch di abilitazione ACS (acqua calda sanitaria). Disattivalo per nasconderlo ed evitare commutazioni accidentali. Ha effetto solo con modalità sola lettura disattivata. Predefinito: attivo.
  adv_int:
    name: Integrazione avanzata
    description: Crea entità climate native di Home Assistant per ogni zona attiva (richiede modalità sola lettura disattivata).
  cleanup_legacy:
    name: Pulizia entità v1.x
    description: All'avvio rimuove i topic di discovery per-entità creati dalle versioni 1.x dell'add-on.
  debug:
    name: Log di debug completo
    description: Registra tutti i parametri letti e ogni messaggio MQTT. Solo a scopo di supporto/diagnostica; lascia disattivato per l'uso normale.
  poll_interval:
    name: Intervallo di aggiornamento
    description: Secondi tra un aggiornamento dati e l'altro dal cloud Setecna (10-600).
  mqtt_host:
    name: Host server MQTT esterno
    description: Hostname o IP di un broker MQTT personalizzato. Lascia vuoto per usare automaticamente l'add-on Mosquitto.
  mqtt_port:
    name: Porta server MQTT esterno
    description: Porta del broker MQTT personalizzato (predefinita 1883). Usata solo se è impostato un host personalizzato.
  mqtt_username:
    name: Nome utente server MQTT esterno
    description: Nome utente per il broker MQTT personalizzato. Lascia vuoto per accesso anonimo.
  mqtt_password:
    name: Password server MQTT esterno
    description: Password per il broker MQTT personalizzato.
  entity_names:
    name: Rinomina entità
    description: >-
      Rinomina le entità con una riga "PREFISSO=Nome". Un prefisso di zona rinomina il device di quella zona e tutte le sue entità, es. "Z1=Bagni" (il termostato e tutti i sensori della zona seguono). L'id esatto di un parametro rinomina una singola entità, es. "GLOBAL_OUTPUT_3=Pompa ricircolo". Prefissi e id fanno distinzione tra maiuscole e minuscole (usa "Z1", non "z1"). Un prefisso di calendario ("MT1", "MT2", ...) rinomina insieme il preset e la modalità di quel programma, es. "MT3=Bagni". Il log dell'add-on elenca le etichette del tuo sistema Setecna da copiare.
  active_zones:
    name: Zone da esporre
    description: >-
      Elenco facoltativo dei numeri di zona da esporre (es. 1, 2, 3). Le zone
      rilevate sul pannello ma non elencate qui - con tutti i loro sensori,
      controlli e termostato - vengono nascoste e rimosse da Home Assistant.
      Lascia vuoto per esporre tutte le zone rilevate.
