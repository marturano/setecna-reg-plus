configuration:
  systemID:
    name: System-ID
    description: Die ID Ihres Setecna-REG-Systems, wie sie in der s5a.eu-Weboberfläche angezeigt wird.
  username:
    name: Benutzername
    description: Die E-Mail-Adresse Ihres s5a.eu-Kontos.
  password:
    name: Passwort
    description: Das Passwort Ihres s5a.eu-Kontos.
  readonly:
    name: Nur-Lese-Modus
    description: Nur Sensoren bereitstellen, niemals etwas an das Setecna-System zurückschreiben.
  diagnostics:
    name: Diagnoseentitäten anzeigen
    description: >-
      Wenn aktiviert, werden die Diagnoseentitäten (Rohcodes, Alarme, Platinenausgänge, Wärmepumpen-/Reglerstatus, ...) als deaktivierte Entitäten bereitgestellt, die einzeln aktiviert werden können. Wenn aus (Standard), werden sie nicht erstellt.
  language:
    name: Sprache der Dropdown-Bezeichnungen
    description: >-
      Sprache für die Optionen der Dropdown-/Enum-Entitäten (Saison, Zonen- und Kalenderzwang, Kalendermodus). Home Assistant kann diese nicht automatisch übersetzen. Entitätsnamen bleiben auf Englisch. Standard: Englisch.
  system_control:
    name: System-Steuerung anzeigen
    description: >-
      Zeigt die Master-Ein/Aus-Steuerung System an (schaltet die gesamte Anlage ein/aus). Deaktivieren, um sie auszublenden und versehentliches Schalten zu verhindern (z. B. durch Sprachassistenten). Nur wirksam, wenn der Nur-Lese-Modus aus ist. Standard: ein.
  season_control:
    name: Saison-Steuerung anzeigen
    description: >-
      Zeigt den Saison-Wähler (Winter/Sommer) an. Deaktivieren, um ihn auszublenden und versehentliche Änderungen zu verhindern. Nur wirksam, wenn der Nur-Lese-Modus aus ist. Standard: ein.
  acs_control:
    name: ACS-Steuerung anzeigen
    description: >-
      Zeigt den ACS-Freigabeschalter (Warmwasser) an. Deaktivieren, um ihn auszublenden und versehentliches Schalten zu verhindern. Nur wirksam, wenn der Nur-Lese-Modus aus ist. Standard: ein.
  adv_int:
    name: Erweiterte Integration
    description: Native Home-Assistant-Klimaentitäten für jede aktive Zone erstellen (erfordert deaktivierten Nur-Lese-Modus).
  cleanup_legacy:
    name: v1.x-Entitäten bereinigen
    description: Beim Start die per-Entität-MQTT-Discovery-Topics der Add-on-Versionen 1.x entfernen.
  poll_interval:
    name: Abfrageintervall
    description: Sekunden zwischen den Datenaktualisierungen aus der Setecna-Cloud (10-600).
  mqtt_host:
    name: Host des externen MQTT-Servers
    description: Hostname oder IP eines eigenen MQTT-Brokers. Leer lassen, um das Mosquitto-Broker-Add-on automatisch zu erkennen.
  mqtt_port:
    name: Port des externen MQTT-Servers
    description: Port des eigenen MQTT-Brokers (Standard 1883). Wird nur verwendet, wenn ein eigener Host gesetzt ist.
  mqtt_username:
    name: Benutzername des externen MQTT-Servers
    description: Benutzername für den eigenen MQTT-Broker. Für anonymen Zugriff leer lassen.
  mqtt_password:
    name: Passwort des externen MQTT-Servers
    description: Passwort für den eigenen MQTT-Broker.
  entity_names:
    name: Entitätsnamen überschreiben
    description: >-
      Entitäten umbenennen mit je einer Zeile "PRÄFIX=Name". Ein Zonen-Präfix benennt das Gerät dieser Zone und alle zugehörigen Entitäten um, z. B. "Z1=Bäder" (Thermostat und alle Zonensensoren folgen). Eine exakte Parameter-ID benennt eine einzelne Entität um, z. B. "GLOBAL_OUTPUT_3=Umwälzpumpe". Präfixe und IDs berücksichtigen Gross-/Kleinschreibung ("Z1", nicht "z1"). Ein Kalender-Präfix ("MT1", "MT2", ...) benennt Preset und Modus dieses Programms gemeinsam um, z. B. "MT3=Bäder". Das Add-on-Protokoll listet die Bezeichnungen Ihres Systems zum Kopieren auf.
  active_zones:
    name: Anzuzeigende Zonen
    description: >-
      Optionale Positivliste der anzuzeigenden Zonennummern (z. B. 1, 2, 3).
      Zonen, die auf der Anlage erkannt, aber hier nicht aufgeführt werden -
      samt allen Sensoren, Bedienelementen und Thermostat - werden ausgeblendet
      und aus Home Assistant entfernt. Leer lassen, um alle erkannten Zonen
      anzuzeigen.
