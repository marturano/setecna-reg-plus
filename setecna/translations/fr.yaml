configuration:
  systemID:
    name: ID du système
    description: L'identifiant de votre système Setecna REG tel qu'affiché dans l'interface web s5a.eu.
  username:
    name: Nom d'utilisateur
    description: L'adresse e-mail de votre compte s5a.eu.
  password:
    name: Mot de passe
    description: Le mot de passe de votre compte s5a.eu.
  readonly:
    name: Mode lecture seule
    description: N'exposer que les capteurs, ne jamais rien réécrire vers le système Setecna.
  diagnostics:
    name: Exposer les entités de diagnostic
    description: >-
      Si activé, expose les entités de diagnostic (codes bruts, alarmes, sorties carte, état pompes/régulateur, ...) comme entités désactivées que vous pouvez activer individuellement. Si désactivé (par défaut), elles ne sont pas créées.
  language:
    name: Langue des libellés des listes déroulantes
    description: >-
      Langue utilisée pour les options des entités liste déroulante/enum (saison, forçage des zones et calendriers, mode calendrier). Home Assistant ne peut pas les traduire automatiquement. Les noms des entités restent en anglais. Par défaut : anglais.
  system_control:
    name: Afficher le contrôle System
    description: >-
      Affiche le contrôle maître System marche/arrêt (allume ou éteint toute l'installation). Désactivez-le pour le masquer et éviter les commutations accidentelles (ex. via les assistants vocaux). Actif uniquement si le mode lecture seule est désactivé. Par défaut : activé.
  season_control:
    name: Afficher le contrôle Season
    description: >-
      Affiche le sélecteur Season (hiver/été). Désactivez pour le masquer et éviter les changements accidentels. Actif uniquement si le mode lecture seule est désactivé. Par défaut : activé.
  acs_control:
    name: Afficher le contrôle ACS
    description: >-
      Affiche l'interrupteur d'activation ACS (eau chaude sanitaire). Désactivez pour le masquer et éviter les commutations accidentelles. Actif uniquement si le mode lecture seule est désactivé. Par défaut : activé.
  adv_int:
    name: Intégration avancée
    description: Créer des entités climate natives de Home Assistant pour chaque zone active (nécessite le mode lecture seule désactivé).
  cleanup_legacy:
    name: Nettoyer les entités v1.x
    description: Au démarrage, supprimer les topics de découverte MQTT par entité créés par les versions 1.x de l'add-on.
  debug:
    name: Journalisation de débogage complète
    description: Enregistre tous les paramètres lus et chaque message MQTT. Uniquement à des fins de support/diagnostic ; laisser désactivé en usage normal.
  hide_unavailable:
    name: Masquer les capteurs indisponibles
    description: Ne crée pas les capteurs de température/bruts dont l'entrée lit une valeur "indisponible" sur votre système (ils apparaîtraient comme "inconnu"). Les commandes et capteurs dérivés ne sont pas affectés. Activé par défaut ; désactivez-le pour les afficher comme "inconnu".
  poll_interval:
    name: Intervalle d'interrogation
    description: Secondes entre les rafraîchissements de données depuis le cloud Setecna (10-600).
  mqtt_host:
    name: Hôte du serveur MQTT externe
    description: Nom d'hôte ou IP d'un broker MQTT personnalisé. Laisser vide pour détecter automatiquement l'add-on Mosquitto.
  mqtt_port:
    name: Port du serveur MQTT externe
    description: Port du broker MQTT personnalisé (par défaut 1883). Utilisé uniquement si un hôte personnalisé est défini.
  mqtt_username:
    name: Nom d'utilisateur du serveur MQTT externe
    description: Nom d'utilisateur du broker MQTT personnalisé. Laisser vide pour un accès anonyme.
  mqtt_password:
    name: Mot de passe du serveur MQTT externe
    description: Mot de passe du broker MQTT personnalisé.
  entity_names:
    name: Renommage des entités
    description: >-
      Renommez les entités avec une ligne "PRÉFIXE=Nom" par entrée. Un préfixe de zone renomme l'appareil de cette zone et toutes ses entités, ex. "Z1=Salles de bain" (le thermostat et tous les capteurs de la zone suivent). Un id de paramètre exact renomme une seule entité, ex. "GLOBAL_OUTPUT_3=Pompe de recirculation". Les préfixes et ids sont sensibles à la casse ("Z1", pas "z1"). Un préfixe de calendrier ("MT1", "MT2", ...) renomme ensemble le préréglage et le mode de ce programme, ex. "MT3=Salles de bain". Le journal de l'add-on liste les libellés de votre système à copier.
  active_zones:
    name: Zones à exposer
    description: >-
      Liste blanche facultative des numéros de zone à exposer (p. ex. 1, 2, 3).
      Les zones détectées sur le panneau mais non listées ici - avec tous leurs
      capteurs, commandes et thermostat - sont masquées et supprimées de Home
      Assistant. Laisser vide pour exposer toutes les zones détectées.
